<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="860" height="280" viewBox="0 0 860 280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap');
    </style>
  </defs>
  <foreignObject width="860" height="280">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .wrap {
          width: 860px;
          height: 280px;
          background: linear-gradient(135deg, #0d1117 0%, #161b22 60%, #0d1117 100%);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-family: 'Outfit', 'Segoe UI', sans-serif;
          position: relative;
          overflow: hidden;
        }
        .grid-bg {
          position: absolute;
          inset: 0;
          background-image:
            linear-gradient(rgba(99,153,34,0.07) 1px, transparent 1px),
            linear-gradient(90deg, rgba(99,153,34,0.07) 1px, transparent 1px);
          background-size: 40px 40px;
        }
        .glow {
          position: absolute;
          width: 400px;
          height: 200px;
          background: radial-gradient(ellipse, rgba(99,153,34,0.15) 0%, transparent 70%);
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
        }
        .content {
          position: relative;
          z-index: 2;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 14px;
        }
        .title {
          font-size: 52px;
          font-weight: 700;
          color: #f0f6fc;
          letter-spacing: -2px;
          line-height: 1;
        }
        .title span {
          color: #7ee787;
        }
        .tagline {
          font-size: 16px;
          color: #8b949e;
          font-style: italic;
          letter-spacing: 0.3px;
        }
        .badges {
          display: flex;
          gap: 10px;
          margin-top: 6px;
        }
        .badge {
          padding: 5px 14px;
          border-radius: 999px;
          font-size: 12px;
          font-weight: 600;
          letter-spacing: 0.3px;
        }
        .b-green { background: rgba(46,160,67,0.2); color: #7ee787; border: 1px solid rgba(46,160,67,0.4); }
        .b-blue  { background: rgba(56,139,253,0.15); color: #79c0ff; border: 1px solid rgba(56,139,253,0.35); }
        .b-purple{ background: rgba(188,140,255,0.15); color: #d2a8ff; border: 1px solid rgba(188,140,255,0.35); }
        .b-red   { background: rgba(248,81,73,0.15); color: #ff7b72; border: 1px solid rgba(248,81,73,0.3); }
        .deco-left {
          position: absolute;
          left: 40px;
          top: 50%;
          transform: translateY(-50%);
          display: flex;
          flex-direction: column;
          gap: 8px;
          opacity: 0.4;
        }
        .deco-right {
          position: absolute;
          right: 40px;
          top: 50%;
          transform: translateY(-50%);
          display: flex;
          flex-direction: column;
          gap: 8px;
          opacity: 0.4;
        }
        .dot-row { display: flex; gap: 8px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: #7ee787; }
        .line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, #7ee787, transparent); }
      </style>
      <div class="wrap">
        <div class="grid-bg"></div>
        <div class="glow"></div>
        <div class="deco-left">
          <div class="line"></div>
          <div class="dot-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="line"></div>
          <div class="dot-row"><div class="dot"></div><div class="dot"></div></div>
          <div class="line"></div>
        </div>
        <div class="deco-right">
          <div class="line"></div>
          <div class="dot-row"><div class="dot"></div><div class="dot"></div></div>
          <div class="line"></div>
          <div class="dot-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="line"></div>
        </div>
        <div class="content">
          <div class="title">MMO<span>Block</span></div>
          <div class="tagline">Unblock the Fun, One Click at a Time.</div>
          <div class="badges">
            <span class="badge b-green">Build Passing</span>
            <span class="badge b-blue">Maven v3.0.5</span>
            <span class="badge b-purple">Javadocs</span>
            <span class="badge b-red">Issues</span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
