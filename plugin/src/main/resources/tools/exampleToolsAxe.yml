exampleToolsAxe:
  - material: DIAMOND_AXE
    # have 3 different click types, left_click, right_click, and both_click. You can choose to use one or more of them.
    both_click:
      decreaseDurability: 15
      clickNeeded: 4
    allowedDrops:
      - exampleDropsWood # Reference to the drops defined in exampleDropsWood.yml
  - material: NETHERITE_AXE
    left_click:
      decreaseDurability: 10
      clickNeeded: 3
    allowedDrops:
      - exampleDropsWood
  - material: NETHERITE_AXE
    right_click:
      decreaseDurability: 10
      clickNeeded: 3
    allowedDrops: []