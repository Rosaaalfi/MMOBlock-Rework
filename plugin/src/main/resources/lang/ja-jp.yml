debug:
  load: "&e[MMOBlock] &7デバッグモードが有効です。"
commands:
  usage:
    block: "&e/mmoblock block <place|remove|get|list> <blockId> x y z [world] [facing]"
    node: "&e/mmoblock node <place|remove|get|list> <nodeId> x y z [world] [facing]"
    reload: "&e/mmoblock reload [config|blocks|drops|lang|tools]"
  unknown_subcommand: "&c不明なサブコマンドです。"
  world_not_found: "&cワールドが見つかりません: {world}"
  place:
    usage: "&e使用方法: /mmoblock block place <blockId> x y z [world] [facing]"
    invalid_facing: "&c向きが無効です: {facing} (north, south, east, west)"
    failed: "&cブロック設置に失敗しました: {reason}"
    success: "&a{id} を {world} {x} {y} {z} に設置しました"
  remove:
    usage: "&e使用方法: /mmoblock block remove <blockId> x y z [world]"
    not_found: "&cその座標にブロックが見つかりません。"
    success: "&a{id} を {world} {x} {y} {z} から削除しました"
  reload:
    all: "&aconfig, blocks, drops, lang, tools を再読み込みしました。"
    config: "&aconfig.yml を再読み込みしました"
  node:
    usage: "&e使用方法: /mmoblock node <place|remove|get|list> <nodeId> x y z [world] [facing]"
    place:
      usage: "&e使用方法: /mmoblock node place <nodeId> x y z [world] [facing]"
    remove:
      usage: "&e使用方法: /mmoblock node remove <nodeId> x y z [world]"
    get:
      usage: "&e使用方法: /mmoblock node get <nodeId|remover>"
  block:
    usage: "&e使用方法: /mmoblock block <place|remove|get|list> <blockId> x y z [world] [facing]"
    place:
      usage: "&e使用方法: /mmoblock block place <blockId> x y z [world] [facing]"
    remove:
      usage: "&e使用方法: /mmoblock block remove <blockId> x y z [world]"
    get:
      usage: "&e使用方法: /mmoblock block get <blockId|remover>"
blocks:
  not_active: "&c[MMOBlock] ブロックはまだ有効ではありません。"
  too_fast: "&c[MMOBlock] 連打が速すぎます。"
  config_missing: "&c[MMOBlock] ブロック設定が見つかりません。"
  tool_not_allowed: "&c[MMOBlock] このブロックにそのツールは使えません。"
  mining_progress: "&e[MMOBlock] 採掘進捗: {progress}/{needed} &7[{progress_bar}&7]"
  broken: "&a[MMOBlock] ブロックを破壊しました。{respawn}秒後にリスポーンします"