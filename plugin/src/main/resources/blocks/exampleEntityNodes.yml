exampleEntityNodes:
  name: "&7Example Entity Nodes"
  respawnTime: 1 # Time in seconds for the entity to respawn after being killed
  particleBreak:
    enabled: true
    source:
      type: VANILLA
      value: "minecraft:lava"
    fallback:
      type: VANILLA
      value: "minecraft:stone"
  sound:
    onClick: block.stone.hit # Sound to play when the entity is clicked.
    onDead: block.stone.break # Sound to play when the entity is killed.
    onRespawn: block.stone.place # Sound to play when the entity respawns.
  breakAnimation: true # Whether to play the block breaking animation when the entity is click. using packet block breaking animation.
  hitbox: # AABB hitbox for the entity. The hitbox will be centered on the entity's location.
    width: 1.2 # The width of the entity's hitbox.
    height: 1.2 # The height of the entity's hitbox.
  modelType:
    block:
      enabled: true
      block: minecraft:diamond_block # The exact block to use as the display for the entity. This will be used if modelEngine is disabled.
  allowedTools:
    - exampleTools
  conditions:
    - condition: 1
      type: placholder
      value: "%player_health%" #placeholder from PlaceholderAPI to check the player's health.
      operator: ">" # The operator to use for the condition. Supported operators are: >, <, >=, <=, ==, !=, for String value, you can also use == and !=.
      compareTo: "10" #also support String value for compareTo, so you can use placeholder in compareTo as well, for example: %player_name%.
      placeholderText:
        require: "<anim:colors:#999bff;#148a87;#81dd1a;#dd1aa9;#148a87>Require HP 10</anim> &a✔"
        notMet: "<anim:colors:#999bff;#148a87;#81dd1a;#dd1aa9;#148a87>Require HP 10</anim> &c❌"
      sendTitle: "&cYou are too weak to mine this block!"
      sendSubtitle: "&7You need at least 10 health to mine this block."
  display: # Use holograms to display information about the entity. You can have up to 4 lines of text.
    displayHeight: 2.1 # height of the all hologram lines above the entity's location. This will be the height of the first line of the hologram. The second line will be 0.25 blocks below the first line, the third line will be 0.25 blocks below the second line, and the fourth line will be 0.25 blocks below the third line.
    lines:
      - line: 1 #top line of the hologram
        contents:
          item: minecraft:diamond # display an item in the hologram. The item will be displayed as a drop item like in the hologram.
          click: hide #hide/remove this line while player interacting
      - line: 2 #second line of the hologram, below the first line
        contents:
          #text: "&6Example Entity"
          text: "<anim:wave:&1;&b>Example Entity Nodes</anim>" #animasi seperti bergelombang pada pergantian warnanya
          click: hide #this key/field have to type store, hide as boolean true(true mean hide, false mean not hide and false trigger by fill with text string) and "Text" string text
      - line: 3 #third line of the hologram, below the second line
        contents:
          text: "{condition_1}" #display the placeholder text from the condition if the condition is not met, and animate the text with a color changing animation. You can also use {condition_<id>} to display the placeholder text from the condition, and it will automatically update when the condition is met or not met.
          click: "<anim:typewriter:&e;&6>Mining......</anim>"
      - line: 4 #fourth line of the hologram, below the third line
        contents:
          text: "<anim:burn:#999bff;#ffe599>Click to Mine!</anim>" #<anim:name:args></anim>
          #text: "&7Click to Mine!"
          click: "&7[&r{progress_bar}&7] &f(%mmoblock_progress%/%mmoblock_max_progress%)" # You can also use %mmoblock_progress% and %mmoblock_max_progress%.
