name: MMOBlock
prefix: "Chyxel"
version: '${version}'

dependencies:
  server:
    ViaVersion:
      load: BEFORE
      required: false
    ViaBackwards:
      load: BEFORE
      required: false
    ViaRewind:
      load: BEFORE
      required: false
    Geyser-Spigot:
      load: BEFORE
      required: false

main: me.chyxelmc.mmoblock.MMOBlock
bootstrapper: me.chyxelmc.mmoblock.MMOBlockBootstrap
loader: me.chyxelmc.mmoblock.MMOBlockLoader
api-version: '1.19'
load: POSTWORLD

permissions:
  mmoblock.admin:
    description: Allows using MMOBlock admin commands
    default: op

authors:
  - Aniko
website: chyxelmc.me